name: Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v1.0.0, v2.1.0 等版本标签时触发

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 需要写入权限来创建 Release

    steps:
      - uses: actions/checkout@v4

      # ===== 构建后端 =====
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build backend JAR
        run: mvn package -DskipTests
        working-directory: backend

      # ===== 构建前端 =====
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # ===== 打包发布包 =====
      - name: Package release zip
        run: |
          # 创建发布目录
          mkdir -p release/backend
          mkdir -p release/frontend

          # 复制后端 JAR
          cp backend/target/*.jar release/backend/

          # 复制前端构建产物
          cp -r frontend/dist release/frontend/static

          # 复制配置文件
          cp README.md release/
          cp API.md release/
          cp -r plans release/plans

          # 压缩为 ZIP
          cd release
          zip -r ../zuul-game-${{ github.ref_name }}.zip .

      # ===== 创建 GitHub Release 并上传附件 =====
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Zuul Game ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: zuul-game-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
